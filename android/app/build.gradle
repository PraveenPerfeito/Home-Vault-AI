plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

// Redirect build output to where Flutter expects it (fixes cross-drive path on Windows).
// IMPORTANT: This must come before the android{} block so that jniLibs.srcDirs (added
// below) uses the correct buildDir.  The flutter-gradle-plugin registers jniLibs at the
// DEFAULT buildDir during plugin application (before this assignment executes), so we
// re-add the correct path explicitly inside android.sourceSets to ensure libapp.so (the
// Dart AOT snapshot) is always packaged into the APK.
buildDir = new File(rootProject.projectDir.parentFile, "build/app")

android {
    sourceSets {
        main {
            // Re-register Flutter's Dart AOT snapshot dir with the post-redirect buildDir.
            // Without this, R8 packages the APK without libapp.so → "VM snapshot invalid" crash.
            jniLibs.srcDirs += ["${buildDir}/intermediates/flutter/release/jniLibs",
                                 "${buildDir}/intermediates/flutter/debug/jniLibs"]
        }
    }
    namespace "com.viyalabs.home_vault"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    defaultConfig {
        applicationId = "com.viyalabs.home_vault"
        minSdkVersion = flutter.minSdkVersion  // Android 6.0 — Firebase Auth minimum
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.debug  // Phase 2: replace with release keystore
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
