name: home_vault
description: Home Vault AI — scan products, track expiry dates, and get reminders before they expire.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.3.0

  # Local storage
  hive_flutter: ^1.1.0

  # OCR Scanner (Phase 3)
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.1

  # Notifications (Phase 5)
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  shared_preferences: ^2.3.3

  # Utilities
  logger: ^2.4.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Branding
  flutter_launcher_icons: ^0.14.2

  # Linting
  flutter_lints: ^4.0.0
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.0

# ── Launcher icon configuration (run: dart run flutter_launcher_icons) ───────
flutter_launcher_icons:
  android: true          # overwrites mipmap/ic_launcher at all densities
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  # Adaptive icon (Android 8+ / API 26+) — full image used for both layers
  adaptive_icon_background: "assets/icon/icon.png"
  adaptive_icon_foreground: "assets/icon/icon.png"
  # Disable non-Android platforms
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
  linux:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
